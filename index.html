<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>  
<h1> Mini Dashboard</h1>
<div class="main-wrapper">
<div class="input">
    <h4>Product Name:</h4>
    <input type="text" placeholder="Type Product Name" class="userInput"><br>
    <h4>Product Price:</h4>
    <input type="number" placeholder="Type Product Price" class="userInputPrice"><br><br>
    <button class="addBtn">Add</button>
</div>
<div class="inputCard">
    <input class="discountPercentage" type="number" placeholder="Enter Discount Percentage">
    <button class="discountBtn">Add Discount</button><button class="remove">Remove</button>
    <h3 class="totalProducts">Total Products</h3>
<ul class="userDetails">
</ul>
</div>
</div>
</body>
<script src="app.js"></script>
</html>
